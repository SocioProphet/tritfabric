apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tritfabric-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tritfabric-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tritfabric-server
        app.kubernetes.io/part-of: tritfabric
    spec:
      containers:
        - name: server
          image: ghcr.io/REPLACE_ME/tritfabric-server:latest
          ports:
            - containerPort: 8000
  strategy:
    canary:
      steps:
        - setWeight: 20
        - analysis:
            templates:
              - templateName: tritfabric-slo
        - setWeight: 50
        - pause: {duration: 2m}
        - setWeight: 100
