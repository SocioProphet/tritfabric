apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tritfabric-aead
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tritfabric-vault
    kind: SecretStore
  target:
    name: tritfabric-aead
    creationPolicy: Owner
  data:
    - secretKey: aead_key
      remoteRef:
        key: tritfabric/aead
        property: key
