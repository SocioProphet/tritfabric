apiVersion: apps/v1
kind: Deployment
metadata:
  name: tritfabric-sse
  labels:
    app.kubernetes.io/name: tritfabric-sse
    app.kubernetes.io/part-of: tritfabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tritfabric-sse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tritfabric-sse
        app.kubernetes.io/part-of: tritfabric
        plane: msg
    spec:
      containers:
        - name: sse
          image: ghcr.io/REPLACE_ME/tritfabric-sse:latest
          ports:
            - containerPort: 8080
          env:
            - name: ATLAS_OPT_IN_REQUIRED
              value: "true"
            - name: ATLAS_OPT_IN_TOKEN_SHA256
              valueFrom:
                secretKeyRef:
                  name: tritfabric-optin
                  key: optin_token_sha256
---
apiVersion: v1
kind: Secret
metadata:
  name: tritfabric-optin
type: Opaque
stringData:
  optin_token_sha256: ""
