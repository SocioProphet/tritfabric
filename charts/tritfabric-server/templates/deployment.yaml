apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tritfabric-server.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "tritfabric-server.name" . }}
    app.kubernetes.io/part-of: tritfabric
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tritfabric-server.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tritfabric-server.name" . }}
        app.kubernetes.io/part-of: tritfabric
        plane: ai
    spec:
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
            - containerPort: {{ .Values.metricsPort }}
          env:
            - name: ATLAS_POLICY
              value: /etc/atlas/policy.yaml
          volumeMounts:
            - name: cfg
              mountPath: /etc/atlas
      volumes:
        - name: cfg
          configMap:
            name: {{ include "tritfabric-server.fullname" . }}-policy
