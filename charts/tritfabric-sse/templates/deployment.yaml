apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tritfabric-sse.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "tritfabric-sse.name" . }}
    app.kubernetes.io/part-of: tritfabric
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tritfabric-sse.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tritfabric-sse.name" . }}
        app.kubernetes.io/part-of: tritfabric
        plane: msg
    spec:
      containers:
        - name: sse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: ATLAS_OPT_IN_REQUIRED
              value: "true"
            - name: ATLAS_OPT_IN_TOKEN_SHA256
              valueFrom:
                secretKeyRef:
                  name: {{ include "tritfabric-sse.fullname" . }}-optin
                  key: optin_token_sha256
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tritfabric-sse.fullname" . }}-optin
type: Opaque
stringData:
  optin_token_sha256: "{{ .Values.optInTokenSha256 }}"
