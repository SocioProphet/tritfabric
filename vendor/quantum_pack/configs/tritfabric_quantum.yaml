# TritFabric — Quantum lane
quantum:
  provider: "qiskit"           # "qiskit" with Aer by default; set "qiskit-ibm-runtime" to hit IBM HW
  backend_policy:
    prefer: ["heron"]          # options: "heron","osprey","condor"; advisory only
    qubit_budget: 64           # cap used for layout/subgraph
  estimator:
    shots: 2000
    mitigation: ["m3","zne"]   # toggles honored only when available
  tasks:
    - name: estimate_su2_charge
      algebra: H               # quaternion block
      group: SU(2)
      observable: "J = a1*Z0 + a2*Z1@Z2 + a3*X0@X1"
      params:
        a1: 0.7
        a2: -0.4
        a3: 0.5
    - name: qaoa_schedule_pick
      graph: "heavy_hex_subgraph_k=64"
      p_layers: 2
      objective: "maxcut"
      search:
        kind: "grid"
        gamma: [-1.5, -0.5, 0.5, 1.5]
        beta:  [ 0.2,  0.6, 1.0]
